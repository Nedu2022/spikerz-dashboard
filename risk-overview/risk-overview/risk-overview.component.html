<div class="risk-section">
  <h2 class="section-title">Lorem Ipsum Dolor Sit</h2>

  <div class="risk-content">
    <div class="table-container">
      <table class="risk-table">
        <thead class="table-header">
          <tr>
            <th>Asset</th>
            <th>Contextual Risk</th>
          </tr>
        </thead>
        <tbody>
          <tr class="table-row" *ngFor="let asset of assets">
            <td class="asset-cell">
              <div class="asset-icon">
                <img src="assets/oad-balancer.svg" alt="Oad Balancer" />
                <div class="asset-info">
                  <div class="asset-name">{{ asset.name }}</div>
                  <div class="asset-ip">{{ asset.ip }}</div>
                </div>
              </div>

              <span [class]="getRiskBadgeClass(asset.contextualRisk)">
                {{ asset.contextualRisk }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>

   
      <div class="pagination">
        <button
          class="pagination-btn"
          (click)="previousPage()"
          [disabled]="currentPage === 1"
        >
          ‹
        </button>
        <span class="pagination-info">Showing 1-2 of 2</span>
        <button
          class="pagination-btn"
          (click)="nextPage()"
          [disabled]="currentPage === totalPages"
        >
          ›
        </button>
      </div>
    </div>


    <div class="risk-summary">
  <h3>Contextual Risk</h3>
  <div class="risk-body">
    <div class="risk-legend">
      <div class="legend-item">
        <span class="legend-dot critical"></span>
        <span class="legend-count">{{ riskSummary.critical }}</span>
        <span>Critical</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot high"></span>
        <span class="legend-count">{{ riskSummary.high }}</span>
        <span>High</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot medium"></span>
        <span class="legend-count">{{ riskSummary.medium }}</span>
        <span>Medium</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot low"></span>
        <span class="legend-count">{{ riskSummary.low }}</span>
        <span>Low</span>
      </div>
    </div>

    <div class="risk-circle">{{ riskSummary.total }}</div>
  </div>
</div>
